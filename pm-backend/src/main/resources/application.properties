spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/pm_db
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:root}

spring.jpa.hibernate.ddl-auto=validate

spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

# AWS S3 Configuration
# (Upload expiry is now managed in the config_param DB table)
aws.s3.bucket=${AWS_S3_BUCKET:machine-manual-data}
aws.s3.observations-bucket=${AWS_S3_OBSERVATIONS_BUCKET:pm-tasks-observations}
aws.accessKeyId=${AWS_ACCESS_KEY_ID:place-holder}
aws.secretKey=${AWS_SECRET_KEY:place-holder}
aws.region=${AWS_REGION:ap-south-1}

# Analytics Service Configuration
analytics.service.base-url=${ANALYTICS_SERVICE_BASE_URL:http://localhost:8000}
analytics.service.shared-secret=${ANALYTICS_SHARED_SECRET:}
analytics.service.token-ttl-seconds=${ANALYTICS_TOKEN_TTL_SECONDS:300}

spring.quartz.job-store-type=memory
