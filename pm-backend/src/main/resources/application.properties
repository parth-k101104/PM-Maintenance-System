spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/pm_db
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:root}

spring.jpa.hibernate.ddl-auto=validate

spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

# AWS S3 Configuration
aws.s3.bucket=${AWS_S3_BUCKET:machine-manual-data}
aws.accessKeyId=${AWS_ACCESS_KEY_ID:place-holder}
aws.secretKey=${AWS_SECRET_KEY:place-holder}
aws.region=${AWS_REGION:ap-south-1}
