openapi: 3.0.3
info:
  title: PM Maintenance System API
  description: API documentation for the Preventive and Predictive Maintenance System Backend.
  version: 0.0.1
servers:
  - url: http://localhost:8080
    description: Local development server

paths:
  /api/auth/login:
    post:
      summary: User Login
      description: Authenticates a user and returns a JWT token along with user details and permissions.
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Successful login
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '401':
          description: Unauthorized
          content:
            text/plain:
              schema:
                type: string
                example: "Invalid credentials"

  /api/v1/dashboard/operator:
    get:
      summary: Get Operator Dashboard
      description: Retrieves dashboard summary data for a logged-in operator, including tasks, statuses, items, and time estimates.
      tags:
        - Dashboard
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Successful retrieval of dashboard data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OperatorDashboardResponse'
        '401':
          description: Unauthorized

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    LoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
          example: "operator@example.com"
        password:
          type: string
          example: "secret123"

    LoginResponse:
      type: object
      properties:
        message:
          type: string
          example: "Login successful"
        token:
          type: string
          example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
        employeeId:
          type: integer
          format: int64
          example: 1
        fullName:
          type: string
          example: "John Doe"
        roleId:
          type: integer
          format: int64
          example: 2
        permissions:
          type: object
          additionalProperties: {}
          description: Map of permissions assigned to the user

    DashboardItemDTO:
      type: object
      properties:
        itemName:
          type: string
          example: "Filter Element"
        quantity:
          type: integer
          format: int32
          example: 5

    UserContext:
      type: object
      properties:
        name:
          type: string
          example: "John Doe"
        date:
          type: string
          example: "2023-11-01"
        shift:
          type: string
          example: "Morning"

    TaskSummary:
      type: object
      properties:
        tasksToday:
          type: integer
          format: int32
          example: 10
        backlogTasks:
          type: integer
          format: int32
          example: 2
        remainingTasks:
          type: integer
          format: int32
          example: 4

    TaskStatusCount:
      type: object
      properties:
        approved:
          type: integer
          format: int32
          example: 8
        pending:
          type: integer
          format: int32
          example: 3
        denied:
          type: integer
          format: int32
          example: 1

    TimeEstimate:
      type: object
      properties:
        totalTimeRequiredMins:
          type: integer
          format: int32
          example: 120
        formattedEstimate:
          type: string
          example: "2h 0m"

    OperatorDashboardResponse:
      type: object
      properties:
        userContext:
          $ref: '#/components/schemas/UserContext'
        taskSummary:
          $ref: '#/components/schemas/TaskSummary'
        taskStatus:
          $ref: '#/components/schemas/TaskStatusCount'
        timeEstimate:
          $ref: '#/components/schemas/TimeEstimate'
        requiredItems:
          type: array
          items:
            $ref: '#/components/schemas/DashboardItemDTO'
